<!DOCTYPE html>
<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">
    <title>Dino Game</title>

    <style>        /* Hintergrund und Skalierung */
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url(htleisenstadt.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body>

    <h1 style="color:#0C1585; ">Welcome to KEBAB-Jump!</h1>
    <h2 style="color:#0C1585; ">Press ArrowUp to jump / Press and Hold ArrowDown to duck</h2>
    <canvas id="game" width="1200" height="700"></canvas>

    <script>

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const groundY = 520;

        let gameStarted = false; 

        const dinosertImg = new Image();
        dinosertImg.src = "sert.png";

        const cactuskebabImg = new Image();
        cactuskebabImg.src = "kebapfoto.png";

        const birdhtlImg = new Image();
        birdhtlImg.src = "htllogo.png";

        let dinosert, obstacles, speed, score, gameOver, frame, nextSpawn;

        // start
        function init() {

            dinosert = {
                x: 70,
                y: groundY - 240,
                width: 100,
                height: 240,

                vy: 1,
                gravity: 0.55,
                jump: -15,

                grounded: true,
                ducking: false
            };

            obstacles = [];
            speed = 6;
            score = 0;
            gameOver = false;
            frame = 0;

            nextSpawn = Math.floor(Math.random() * 100) + 60;
        }

        
        document.addEventListener("keydown", (e) => {           // e für Eventobjekt 

            // start und restart
            if (e.code === "Enter") {

                if (!gameStarted) {
                    gameStarted = true;
                    init();
                }

                if (gameOver) {
                    init();
                }
            }

            // springen
            if (e.code === "ArrowUp" && dinosert.grounded) {
                dinosert.vy = dinosert.jump;
                dinosert.grounded = false;
            }

            // ducken
            if (e.code === "ArrowDown" && dinosert.grounded) {
                dinosert.ducking = true;
            }
        });

        // aufhören des duckens
        document.addEventListener("keyup", (e) => {

            if (e.code === "ArrowDown") {
                dinosert.ducking = false;
            }
        });

        // darstellung von blöcken
        function spawnObstacle() {

            let type = Math.random() < 0.7 ? "cactuskebab" : "birdhtl";

            obstacles.push({

                x: canvas.width,

                y: type === "cactuskebab"
                    ? groundY - 55
                    : groundY - 280,

                width: 70,
                height: 70,

                type: type
            });
        }

        // kollidiert nur nicht wenn aabb
        function collide(a, b) {

            return (
                a.x < b.x + b.width &&
                a.x + a.width > b.x &&
                a.y < b.y + b.height &&
                a.y + a.height > b.y
            );
        }

        
        function update() {

            if (!gameStarted || gameOver) return; 

            frame++;

            
            if (dinosert.ducking && dinosert.grounded) {
                dinosert.height = 140;
            } else {
                dinosert.height = 240;
            }

            
            dinosert.vy += dinosert.gravity;
            dinosert.y += dinosert.vy;

            // dass der sert am boden bleiben kann
            if (dinosert.y >= groundY - dinosert.height) {

                dinosert.y = groundY - dinosert.height;

                dinosert.vy = 0;
                dinosert.grounded = true;
            }

            // wann die blöcke und in welchen Abständen kommen
            if (frame >= nextSpawn) {

                spawnObstacle();

                nextSpawn = frame + Math.floor(Math.random() * 80) + (100 - speed * 5);
            }

            // bewegung von blöcken
            for (let i = 0; i < obstacles.length; i++) {

                obstacles[i].x -= speed;

                if (collide(dinosert, obstacles[i])) {
                    gameOver = true;
                }
            }

            obstacles = obstacles.filter(o => o.x > -50);

            if (frame % 300 === 0) {
                speed += 0.5;
            }

            score++;
        }

        // erscheinung von titelschrift 
        function draw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameStarted) {

                ctx.font = "40px Arial";
                ctx.fillStyle ="#FFEF5E";
                ctx.fillText("Press ENTER to Start", 400, 300);
                return;
            }

            // boden
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            
            ctx.drawImage(dinosertImg, dinosert.x, dinosert.y, dinosert.width, dinosert.height);

            // wie die blöcke erscheinen
            obstacles.forEach(o => {

                if (o.type === "cactuskebab") {
                    ctx.drawImage(cactuskebabImg, o.x, o.y, o.width, o.height);
                } else {
                    ctx.drawImage(birdhtlImg, o.x, o.y, o.width, o.height);
                }
            });

            ctx.font = "22px Arial";
            ctx.fillStyle = "#0C1585";
            ctx.fillText("Score: " + score, 1000, 40);

            // game over
            if (gameOver) {

                ctx.font = "30px Arial";
                ctx.fillStyle = "#FF0000";
                ctx.fillText(
                    "GAME OVER - Press ENTER to restart",
                    330,
                    250
                );
            }
        }

        // wiederholung
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();

    </script>

</body>
